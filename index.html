<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2000 Strong - Camp Log Production</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<body style="margin:0; padding:16px; background:#f0ede3;">

<div id="tracker-root">
  <header class="hdr">
    <div class="hdr-top-row">
      <div class="hdr-title">
        <h1>2000 Strong - Camp Log Production</h1>
        <p class="hdr-sub" id="hdr-sub">Planning Tracker &nbsp;&middot;&nbsp; Camp Grady Spruce</p>
      </div>
      <div class="hdr-btns">
        <button class="qr-btn" id="production-qr-btn" title="Show QR code for this page">

        <button class="reset-btn" id="reset-all-btn" title="Reset all progress">Reset All</button>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Pre-camp task progress</span>
        <span id="prog-label">– of – tasks</span>
      </div>
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="prog-bar"></div></div>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="timeline">Timeline &amp; Tasks</button>
    <button class="tab-btn" data-tab="templates">Outreach Templates</button>
    <button class="tab-btn" data-tab="audit">Content Audit</button>
    <button class="tab-btn" data-tab="atcamp">At Camp</button>
    <button class="tab-btn" data-tab="references">References</button>
  </nav>

  <main>
    <section id="panel-timeline" class="panel active"></section>
    <section id="panel-templates" class="panel"></section>
    <section id="panel-audit" class="panel"></section>
    <section id="panel-atcamp" class="panel"></section>
    <section id="panel-references" class="panel"></section>
  </main>

  <div class="toast" id="toast"></div>
</div>

<div id="qr-modal-overlay">
  <div id="qr-modal-box">
    <div id="qr-modal-label"></div>
    <div id="qr-modal-sub">Scan to open on your phone</div>
    <div id="qr-modal-code"></div>
    <button id="qr-modal-close">Close</button>
  </div>

    --line: #e2dccb;

  .atcamp-filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-chip {
    font-size: 11.5px; font-weight: 600; padding: 5px 11px; border-radius: 20px;

  .atcamp-list { display: flex; flex-direction: column; gap: 7px; }
  .atcamp-row {

  .atcamp-main { flex: 1; min-width: 0; }
  .atcamp-name { font-size: 13px; color: var(--ink); font-weight: 600; line-height: 1.3; }

  .atcamp-edit-name {

  .atcamp-input-note {

  .atcamp-input-note:focus { outline: none; border-bottom: 1px dashed var(--gold); color: var(--ink); }

  .status-btn {

  .status-btn.st-green { background: var(--green); }
  .status-btn.st-red { background: var(--red); }

  .atcamp-remove {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; border: none;
    background: var(--cream); color: var(--mid); font-size: 14px; line-height: 1; cursor: pointer;

  .atcamp-add {

  .atcamp-add input {

    padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer;

  .toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(10px);

  @media (max-width: 420px) {
    .hdr h1 { font-size: 17px; }
    .tab-btn { font-size: 12px; padding: 11px 6px; min-width: 90px; }
    main { padding: 12px; }
    .reset-btn { font-size: 10px; padding: 4px 8px; }

</style>

<script>
(function () {
  // ---------------- SUPABASE CONFIG ----------------
  // Replace these two values with your own project's URL and anon (public) key.
  // Found in Supabase: Project Settings > API
  const SUPABASE_URL = 'https://wnubrrilabdqbumvnmwi.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndudWJycmlsYWJkcWJ1bXZubXdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTE3MzksImV4cCI6MjA5OTI4NzczOX0.GWOWus6Y92UtYac4-XYiVFSHggYx1Pims7gsqKcRd8I';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const TABLE = 'camp_log_data';

  const STORAGE_KEY = 'camp-log-task-states';
  const LEGACY_STORAGE_KEY = 'camp-log-2026-task-states';
  const ATCAMP_KEY = 'camp-log-atcamp-pages';
  const AUDIT_KEY = 'camp-log-audit-overrides';
  const CAMPDATE_KEY = 'camp-log-camp-dates';

  // ---------------- DATE HELPERS ----------------
  function parseDateStr(s) {
    if (!s) return null;
    const parts = s.split('-').map(Number);
    if (parts.length !== 3) return null;
    return new Date(parts[0], parts[1] - 1, parts[2]);
  }
  function isoFromDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
  function addDays(date, days) {
    const d = new Date(date);
    d.setDate(d.getDate() + days);
    return d;
  }
  function fmtShort(date) {
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  function offsetLabel(off) {
    const n = Math.abs(off);
    if (off < 0) return `${n}d before camp`;
    if (off === 0) return 'Camp start';
    return `${n}d after start`;
  }
  function fmtOffset(off) {
    if (!campStartDate) return offsetLabel(off);
    return fmtShort(addDays(campStartDate, off));
  }
  function fmtOffsetRange(a, b) {
    if (a === b) return fmtOffset(a);
    if (!campStartDate) return `${offsetLabel(a)} – ${offsetLabel(b)}`;
    const d1 = addDays(campStartDate, a);
    const d2 = addDays(campStartDate, b);
    const m1 = d1.toLocaleDateString('en-US', { month: 'short' });
    const m2 = d2.toLocaleDateString('en-US', { month: 'short' });
    if (m1 === m2) return `${m1} ${d1.getDate()}–${d2.getDate()}`;
    return `${fmtShort(d1)}–${fmtShort(d2)}`;
  }
  function taskDateText(t) {
    if (t.dateOffset == null) return t.dateLabel || '';
    if (Array.isArray(t.dateOffset)) return fmtOffsetRange(t.dateOffset[0], t.dateOffset[1]);
    return fmtOffset(t.dateOffset);
  }
  function headerDatesText() {
    if (campStartDate && campEndDate) {
      const m1 = campStartDate.toLocaleDateString('en-US', { month: 'short' });
      const m2 = campEndDate.toLocaleDateString('en-US', { month: 'short' });
      const y = campEndDate.getFullYear();
      if (m1 === m2) return `${m1} ${campStartDate.getDate()}–${campEndDate.getDate()}, ${y}`;
      return `${fmtShort(campStartDate)}–${fmtShort(campEndDate)}, ${y}`;
    }
    if (campStartDate) return `Starts ${fmtShort(campStartDate)}, ${campStartDate.getFullYear()}`;
    return `Set your camp dates on the Timeline tab`;
  }
  function escapeAttr(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ---------------- DATA ----------------
  // Task dates are stored as day offsets relative to the camp start date (negative = days before camp).
  const phases = [
    {
      label: 'Week 1 of prep', subOffset: [-34, -24],

    templates.forEach((t, i) => {

      `;
      root.appendChild(card);
    });

    templates.forEach((t, i) => {
      document.getElementById(`copy-${i}`).addEventListener('click', () => {
        const text = document.getElementById(`tmpl-${i}`).textContent;
        const btn = document.getElementById(`copy-${i}`);
        const markCopied = () => {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy text'; btn.classList.remove('copied'); }, 1800);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(markCopied).catch(() => fallbackCopy(text, markCopied));
        } else {
          fallbackCopy(text, markCopied);
        }
      });
    });
  }

  function fallbackCopy(text, cb) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); cb(); } catch (e) {}
    document.body.removeChild(ta);
  }

    const keep = auditRows.filter(r => r.status === 'keep').length;
    const update = auditRows.filter(r => r.status === 'update').length;
    const rebuild = auditRows.filter(r => r.status === 'rebuild').length;

    root.innerHTML = `
      <p class="tmpl-note">Tap a status pill to cycle Keep → Update → Rebuild. Tap ✎ to edit a page's name or note.</p>
      <div class="audit-summary">
        <div class="audit-stat"><span class="audit-dot" style="background:var(--green)"></span><span style="color:var(--green);font-weight:700;">${keep} Keep as-is</span></div>
        <div class="audit-stat"><span class="audit-dot" style="background:var(--amber)"></span><span style="color:var(--amber);font-weight:700;">${update} Update data</span></div>
        <div class="audit-stat"><span class="audit-dot" style="background:var(--red)"></span><span style="color:var(--red);font-weight:700;">${rebuild} Rebuild fresh</span></div>
      </div>
      <div class="audit-list">
        ${auditRows.map(row => {
          const badgeClass = row.status === 'keep' ? 'badge-keep' : row.status === 'update' ? 'badge-update' : 'badge-rebuild';
          const badgeLabel = row.status === 'keep' ? 'Keep' : row.status === 'update' ? 'Update' : 'Rebuild';
          if (auditEditingIds.has(row.id)) {
            return `
              <div class="audit-row">
                <div class="audit-edit-row-inputs">
                  <input type="text" class="audit-edit-page" data-audit-page-for="${row.id}" value="${escapeAttr(row.page)}">
                  <input type="text" class="audit-edit-note" data-audit-note-for="${row.id}" value="${escapeAttr(row.note)}">
                </div>
                <button class="done-btn" data-audit-done="${row.id}">Done</button>
              </div>
            `;
          }
          return `
            <div class="audit-row">
              <div class="audit-page">${row.page}<div class="audit-note">${row.note}</div></div>
              <button class="edit-btn" data-audit-edit="${row.id}" aria-label="Edit">✎</button>
              <button class="audit-badge audit-badge-btn ${badgeClass}" data-audit-id="${row.id}">${badgeLabel}</button>
            </div>
          `;
        }).join('')}
      </div>
    `;

    root.querySelectorAll('.audit-badge-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.auditId;
        const row = auditRows.find(r => r.id === id);
        const order = ['keep', 'update', 'rebuild'];
        const idx = order.indexOf(row.status);
        row.status = order[(idx + 1) % order.length];
        auditOverrides[id] = { status: row.status, page: row.page, note: row.note };
        buildAudit();
        await saveAuditOverrides();
      });
    });

    root.querySelectorAll('[data-audit-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        auditEditingIds.add(btn.dataset.auditEdit);
        buildAudit();
      });
    });

    root.querySelectorAll('[data-audit-done]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.auditDone;
        const row = auditRows.find(r => r.id === id);
        const pageInput = root.querySelector(`[data-audit-page-for="${id}"]`);
        const noteInput = root.querySelector(`[data-audit-note-for="${id}"]`);
        row.page = pageInput.value.trim() || row.page;
        row.note = noteInput.value;
        auditEditingIds.delete(id);
        auditOverrides[id] = { status: row.status, page: row.page, note: row.note };
        buildAudit();
        await saveAuditOverrides();
      });
    });
  }

  // ---------------- BUILD: AT CAMP ----------------
  const STATUS_ORDER = ['green', 'red', 'tan', 'violet'];
  const STATUS_LABEL = { green: 'Ready to print', red: 'Needs full check', tan: 'Needs text', violet: 'Needs photos' };
  const STATUS_SHORT = { green: 'Ready', red: 'Full check', tan: 'Needs text', violet: 'Needs photos' };

  function buildAtCamp() {
    const root = document.getElementById('panel-atcamp');
    const counts = { green: 0, red: 0, tan: 0, violet: 0 };
    atCampPages.forEach(p => counts[p.status] = (counts[p.status] || 0) + 1);

    const visiblePages = atCampFilter === 'all' ? atCampPages : atCampPages.filter(p => p.status === atCampFilter);

    root.innerHTML = `
      <p class="atcamp-note">Tap a status pill to cycle Green → Red → Tan → Violet. Tap ✎ to rename a page, or tap a note to edit it. Matches your InDesign color-coding: <b>Green</b> = ready to print, <b>Red</b> = needs full check, <b>Tan</b> = needs text, <b>Violet</b> = needs photos.</p>
      <div class="atcamp-summary">
        <div class="atcamp-stat stat-green"><span class="n">${counts.green || 0}</span>Green</div>
        <div class="atcamp-stat stat-red"><span class="n">${counts.red || 0}</span>Red</div>
        <div class="atcamp-stat stat-tan"><span class="n">${counts.tan || 0}</span>Tan</div>
        <div class="atcamp-stat stat-violet"><span class="n">${counts.violet || 0}</span>Violet</div>
      </div>
      <div class="atcamp-filters" id="atcamp-filters">
        <button class="filter-chip ${atCampFilter === 'all' ? 'active' : ''}" data-filter="all">All (${atCampPages.length})</button>
        <button class="filter-chip ${atCampFilter === 'green' ? 'active' : ''}" data-filter="green">Green</button>
        <button class="filter-chip ${atCampFilter === 'red' ? 'active' : ''}" data-filter="red">Red</button>
        <button class="filter-chip ${atCampFilter === 'tan' ? 'active' : ''}" data-filter="tan">Tan</button>
        <button class="filter-chip ${atCampFilter === 'violet' ? 'active' : ''}" data-filter="violet">Violet</button>
      </div>
      <div class="atcamp-list" id="atcamp-list">
        ${visiblePages.map(p => {
          const nameBlock = atCampEditingIds.has(p.id)
            ? `<input class="atcamp-edit-name" data-name-for="${p.id}" value="${escapeAttr(p.name)}">`
            : `<div class="atcamp-name">${p.name}</div>`;
          const editBtn = atCampEditingIds.has(p.id)
            ? `<button class="edit-btn" data-name-done="${p.id}" aria-label="Save name">✓</button>`
            : `<button class="edit-btn" data-name-edit="${p.id}" aria-label="Edit name">✎</button>`;
          return `
            <div class="atcamp-row is-${p.status}" data-id="${p.id}">
              <div class="atcamp-main">
                <div class="atcamp-name-row">${nameBlock}${editBtn}</div>
                <input class="atcamp-input-note" data-note-for="${p.id}" value="${escapeAttr(p.note)}" placeholder="Add a note…">
              </div>
              <button class="status-btn st-${p.status}" data-status-for="${p.id}">${STATUS_SHORT[p.status]}</button>
              <button class="atcamp-remove" data-remove="${p.id}" aria-label="Remove page">×</button>
            </div>
          `;
        }).join('')}
      </div>
      <div class="atcamp-add">
        <input type="text" id="atcamp-new-name" placeholder="Add a page (e.g. Talent Show photos)">
        <button id="atcamp-add-btn">Add</button>
      </div>
    `;

    root.querySelectorAll('.status-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.statusFor;
        const p = atCampPages.find(x => x.id === id);
        const idx = STATUS_ORDER.indexOf(p.status);
        p.status = STATUS_ORDER[(idx + 1) % STATUS_ORDER.length];
        buildAtCamp();
        await saveAtCampPages();
      });
    });

    root.querySelectorAll('.atcamp-input-note').forEach(input => {
      input.addEventListener('change', async (e) => {
        const id = e.target.dataset.noteFor;
        const p = atCampPages.find(x => x.id === id);
        p.note = e.target.value;
        await saveAtCampPages();
      });
    });

    root.querySelectorAll('[data-name-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        atCampEditingIds.add(btn.dataset.nameEdit);
        buildAtCamp();
      });
    });

    root.querySelectorAll('[data-name-done]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.nameDone;
        const input = root.querySelector(`[data-name-for="${id}"]`);
        const p = atCampPages.find(x => x.id === id);
        p.name = input.value.trim() || p.name;
        atCampEditingIds.delete(id);
        buildAtCamp();
        await saveAtCampPages();
      });
    });

    root.querySelectorAll('.atcamp-remove').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.remove;
        atCampPages = atCampPages.filter(x => x.id !== id);
        buildAtCamp();
        await saveAtCampPages();
      });
    });

    root.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        atCampFilter = chip.dataset.filter;
        buildAtCamp();
      });
    });

    document.getElementById('atcamp-add-btn').addEventListener('click', async () => {
      const input = document.getElementById('atcamp-new-name');
      const name = input.value.trim();
      if (!name) return;
      atCampPages.push({ id: 'ac-' + Date.now(), name, status: 'red', note: '' });
      input.value = '';
      buildAtCamp();
      await saveAtCampPages();
    });

    const nameInput = document.getElementById('atcamp-new-name');
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('atcamp-add-btn').click();
    });
  }

  // ---------------- BUILD: REFERENCES ----------------
  function buildReferences() {
    const root = document.getElementById('panel-references');
    root.innerHTML = `
      <p class="ref-note">Quick links to the production workflow guide and the public archive, plus how-to notes for keeping the archive current each year.</p>

      <div class="ref-links">
        <a class="ref-link-card" href="${WORKFLOW_GUIDE_URL}" target="_blank" rel="noopener">
          <div>
            <div class="ref-link-title">Workflow Guide (PDF)</div>
            <div class="ref-link-sub">Full CampLog production workflow, step-by-step</div>
          </div>
          <div class="ref-link-arrow">&rarr;</div>
        </a>
        <a class="ref-link-card" href="${ARCHIVE_URL}" target="_blank" rel="noopener">
          <div>
            <div class="ref-link-title">2000 Strong Archive</div>
            <div class="ref-link-sub">All years of Camp Logs, Photos, and Devotionals</div>
          </div>
          <div class="ref-link-arrow">&rarr;</div>
        </a>
        <a class="ref-link-card" href="${ARCHIVE_UPDATE_GUIDE_URL}" target="_blank" rel="noopener">
          <div>
            <div class="ref-link-title">Archive Update Guide (PDF)</div>
            <div class="ref-link-sub">Full step-by-step for adding a new year to the archive</div>
          </div>
          <div class="ref-link-arrow">&rarr;</div>
        </a>
      </div>

      <div class="ref-section-title">Overview -- Updating the Archive Each Year</div>
      <div class="ref-steps">
        <h4>The archive is one static HTML page — no database. Each year's Camp Log, Photos album, and Devotional are hardcoded entries. Adding a new year means adding one new entry per section, newest first.</h4>
        <ol>
          <li>Gather this year's three links: the Camp Log PDF's Google Drive share link, the Google Photos album link, and the Devotional PDF's Google Drive share link.</li>
          <li>Open the archive's <code>index.html</code> (repo: <b>camp2000strong/2000strong-archive</b>) and find the <b>Camp Logs</b> section — the first <code>year-card</code> block at the top of its grid.</li>
          <li>Copy that whole block and paste a new copy above it (so the newest year stays first). Update the Drive URL in both the <code>openLog(...)</code> call and the QR icon's <code>showQR(...)</code> call, plus the year number and label text.</li>
          <li>Repeat in the <b>Photos</b> section, using <code>openPhoto(...)</code> instead of <code>openLog(...)</code>, with the Google Photos link.</li>
          <li>Repeat in the <b>Devotionals</b> section — same pattern as Camp Log (uses <code>openLog</code>), but swap the <code>devo-thumb</code>'s year and theme text instead of a cover image.</li>
          <li>Optional: give the Log/Photos card a cover thumbnail by converting a JPG/PNG to base64 and pasting it into that card's <code>&lt;img src="data:image/...;base64,..."&gt;</code>. Devotional cards don't need one — they show year + theme text only.</li>
          <li>Commit and push to the <b>camp2000strong/2000strong-archive</b> GitHub repo, let GitHub Pages rebuild (~1 minute), then check the live archive.</li>
        </ol>
        <div class="ref-callout">
          Worth knowing: the archive's hardcoded approach is why its file is several MB (each year's cover image is embedded as base64). A database backend (like this tracker uses) would shrink the file and let you add a year without touching code — at the cost of needing a network connection to load and a bit more setup. Not changed yet — see the Workflow Guide addendum for the full comparison before deciding.
        </div>
      </div>
    `;
  }

  // ---------------- QR MODAL ----------------
  var currentProductionQR = null;
  function showProductionQR() {
    document.getElementById('qr-modal-label').textContent = '2000 Strong - Camp Log Production';
    const container = document.getElementById('qr-modal-code');
    container.innerHTML = '';
    currentProductionQR = new QRCode(container, {
      text: PRODUCTION_URL, width: 200, height: 200,
      colorDark: '#1b2a3d', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
    document.getElementById('qr-modal-overlay').classList.add('open');
  }
  function closeProductionQR() {
    document.getElementById('qr-modal-overlay').classList.remove('open');
    document.getElementById('qr-modal-code').innerHTML = '';
    currentProductionQR = null;
  }

  // ---------------- RESET ALL ----------------
  async function resetAll() {
    const first = confirm(
      "Reset All will clear every checked task, all At Camp page additions/edits/status changes, and all Content Audit status/text changes — putting everything back to a pre-camp, pre-start status. Your camp dates will be kept.\n\nContinue?"
    );
    if (!first) return;
    const second = confirm(
      "This is permanent and can't be undone. Are you absolutely sure you want to reset everything?"
    );
    if (!second) return;

    try {
      await supabase.from(TABLE).delete().eq('key', STORAGE_KEY);
      await supabase.from(TABLE).delete().eq('key', LEGACY_STORAGE_KEY);
      await supabase.from(TABLE).delete().eq('key', ATCAMP_KEY);
      await supabase.from(TABLE).delete().eq('key', AUDIT_KEY);
      showToast('Everything reset');
    } catch (e) {
      console.error('Reset failed:', e);
      showToast('Reset failed — try again');
      return;
    }
    setTimeout(() => location.reload(), 700);
  }

  // ---------------- TABS ----------------
  function setupTabs() {
    const buttons = document.querySelectorAll('#tabs .tab-btn');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      });
    });
  }

  // ---------------- INIT ----------------
  async function init() {
    await loadState();
    await loadAtCampPages();
    await loadAuditOverrides();
    await loadCampDates();
    buildTimeline();
    buildTemplates();
    buildAudit();
    buildAtCamp();
    buildReferences();
    setupTabs();
    updateProgress();
    updateHeaderSub();
    document.getElementById('reset-all-btn').addEventListener('click', resetAll);
    document.getElementById('production-qr-btn').addEventListener('click', showProductionQR);
    document.getElementById('qr-modal-close').addEventListener('click', closeProductionQR);
    document.getElementById('qr-modal-overlay').addEventListener('click', (e) => {
      if (e.target.id === 'qr-modal-overlay') closeProductionQR();
    });
  }

  init();
})();
</script>

</body>
</html>
